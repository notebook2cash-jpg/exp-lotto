name: Run Exp Lotto Stats

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 1 * * *"   # ทุกวัน 08:00 น. ไทย (01:00 UTC)

permissions:
  contents: write
  models: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        env:
          # token pool หลายตัวที่คุณสร้างไว้ใน secret MODELS_TOKENS
          GITHUB_TOKENS: ${{ secrets.MODELS_TOKENS }}

          # โหมดอ่านใหม่ทั้งรอบ (ไม่ใช้ cache มาข้าม)
          FULL_REFRESH_MODE: "1"
          FULL_REFRESH_MAX_WAIT_MINUTES: "5"

          # ปรับความเร็ว/limit ให้จบไวขึ้น
          MIN_AI_INTERVAL_MS: "1500"
          MAX_AI_CALLS_PER_RUN: "200"
        run: node scripts/scrape-calculation.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update exp lotto stats"
          git push
